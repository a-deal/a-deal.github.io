<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnAIR | Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f4f1eb;
    --warm: #e8e3d9;
    --accent: #b44a2d;
    --muted: #6b6560;
    --faint: #c9c3b8;
    --white: #fefdfb;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .gate {
    max-width: 380px;
    width: 100%;
    padding: 2.5rem;
    background: var(--white);
    border: 1px solid var(--faint);
    border-radius: 8px;
  }
  .gate h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.5rem;
  }
  .gate input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    border: 1px solid var(--faint);
    border-radius: 4px;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    margin-bottom: 1rem;
  }
  .gate input:focus {
    border-color: var(--accent);
  }
  .gate button {
    width: 100%;
    padding: 0.75rem;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    background: var(--ink);
    color: var(--white);
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }
  .gate button:hover {
    background: var(--accent);
  }
  .error {
    color: var(--accent);
    font-size: 0.85rem;
    margin-top: 0.75rem;
    display: none;
  }
</style>
</head>
<body>
<div class="gate">
  <h1>LearnAIR</h1>
  <form>
    <input type="password" placeholder="Password" autofocus>
    <button type="submit">Enter</button>
  </form>
  <p class="error">Wrong password.</p>
</div>
<script>
(function() {
  var form = document.querySelector('form');
  var input = document.querySelector('input[type="password"]');
  var error = document.querySelector('.error');
  var dest = new URLSearchParams(window.location.search).get('r') || 'index.html';

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    if (input.value === 'learnair2026') {
      localStorage.setItem('learnair_access', 'granted');
      window.location.href = dest;
    } else {
      error.style.display = 'block';
      input.value = '';
      input.focus();
    }
  });
})();
</script>
</body>
</html>
