<!DOCTYPE html>
<html class="staticrypt-html">
<head>
  <meta charset="utf-8" />
  <title>Your Health, an honest read</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="cache-control" content="max-age=0" />
  <meta http-equiv="cache-control" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
  <meta http-equiv="pragma" content="no-cache" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink: #1c1917;
      --paper: #faf9f6;
      --warm: #f3f0eb;
      --accent: #b8860b;
      --accent-soft: rgba(184, 134, 11, 0.08);
      --muted: #78716c;
      --faint: #d6d3cd;
    }

    * { box-sizing: border-box; }

    .staticrypt-html, .staticrypt-body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    .staticrypt-body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-image:
        radial-gradient(at 20% 15%, rgba(184, 134, 11, 0.035) 0, transparent 45%),
        radial-gradient(at 80% 85%, rgba(184, 134, 11, 0.025) 0, transparent 45%);
    }

    .staticrypt-content {
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1.5rem;
    }

    .staticrypt-masthead {
      position: absolute;
      top: 1.75rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 2rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.8;
    }

    @media (max-width: 500px) {
      .staticrypt-masthead {
        padding: 0 1.25rem;
        font-size: 0.62rem;
        letter-spacing: 0.18em;
      }
    }

    .staticrypt-page {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .staticrypt-eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .staticrypt-title {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin: 0 0 1.25rem;
    }

    .staticrypt-title em {
      font-style: italic;
      color: var(--accent);
    }

    .staticrypt-instructions {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 1.1rem;
      line-height: 1.5;
      color: var(--muted);
      margin: 0 0 2.75rem;
    }

    .staticrypt-divider {
      width: 2rem;
      height: 1px;
      background: var(--faint);
      margin: 0 auto 2.5rem;
      border: 0;
    }

    .staticrypt-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      max-width: 340px;
      margin: 0 auto;
    }

    .staticrypt-password-container {
      position: relative;
      background: transparent;
      border: 0;
      border-bottom: 1px solid var(--faint);
      transition: border-color 0.3s ease;
    }

    .staticrypt-password-container:focus-within {
      border-bottom-color: var(--accent);
    }

    .staticrypt-form input[type="password"],
    .staticrypt-form input[type="text"] {
      width: 100%;
      background: transparent;
      border: 0;
      outline: 0;
      padding: 0.9rem 2.5rem 0.9rem 0.25rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      letter-spacing: 0.02em;
      text-align: center;
    }

    .staticrypt-form input::placeholder {
      color: var(--muted);
      opacity: 0.5;
      font-style: italic;
      font-family: 'Instrument Serif', serif;
    }

    .staticrypt-toggle-password-visibility {
      cursor: pointer;
      position: absolute;
      right: 0.25rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      opacity: 0.35;
      transition: opacity 0.2s ease;
    }

    .staticrypt-toggle-password-visibility:hover {
      opacity: 0.7;
    }

    .staticrypt-decrypt-button {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--paper);
      background: var(--ink);
      border: 0;
      outline: 0;
      padding: 1rem 2rem;
      margin-top: 0.5rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .staticrypt-decrypt-button:hover {
      background: var(--accent);
    }

    .staticrypt-decrypt-button:active {
      transform: translateY(1px);
    }

    label.staticrypt-remember {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      color: var(--muted);
      cursor: pointer;
    }

    .staticrypt-remember input[type="checkbox"] {
      transform: scale(1.1);
      accent-color: var(--accent);
      cursor: pointer;
    }

    .staticrypt-footer {
      position: absolute;
      bottom: 1.75rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--muted);
      opacity: 0.7;
    }

    .hidden {
      display: none !important;
    }

    .staticrypt-spinner-container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .staticrypt-spinner {
      display: inline-block;
      width: 1.5rem;
      height: 1.5rem;
      border: 1.5px solid var(--faint);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spinner-border 0.75s linear infinite;
    }

    @keyframes spinner-border {
      100% { transform: rotate(360deg); }
    }

    @media screen and (-webkit-min-device-pixel-ratio: 0) {
      .staticrypt-form input[type="password"],
      .staticrypt-form input[type="text"] {
        font-size: 16px;
      }
    }
  </style>
</head>
