name: Proposal Change Alert

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/learnair-partnership-proposal.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get commit info
        id: info
        run: |
          SUBJECT=$(git log -1 --pretty=format:'%s')
          BODY=$(git log -1 --pretty=format:'%b')
          echo "subject=$SUBJECT" >> "$GITHUB_OUTPUT"

          # Filter out Co-Authored-By lines from the body
          CLEAN_BODY=$(echo "$BODY" | grep -v '^Co-Authored-By:' | sed '/^$/d')
          echo "$CLEAN_BODY" > /tmp/commit-body.txt

      - name: Build email body
        run: |
          cat > /tmp/email-body.txt << 'EOF'
          The LearnAIR partnership proposal was updated.
          EOF

          BODY=$(cat /tmp/commit-body.txt)
          if [ -n "$BODY" ]; then
            echo "" >> /tmp/email-body.txt
            echo "What changed:" >> /tmp/email-body.txt
            echo "$BODY" >> /tmp/email-body.txt
          fi

          echo "" >> /tmp/email-body.txt
          echo "View the proposal: https://andrewdeal.info/artifacts/learnair-partnership-proposal.html" >> /tmp/email-body.txt
          echo "View the diff: https://github.com/a-deal/a-deal.github.io/commit/${{ github.sha }}" >> /tmp/email-body.txt

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "LearnAIR Proposal Updated"
          to: deal.e.andrew@gmail.com
          from: LearnAIR Proposals <${{ secrets.SMTP_USERNAME }}>
          body: file:///tmp/email-body.txt
